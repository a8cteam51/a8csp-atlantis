name: Build and Release

on:
  release:
    types: [ released ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer run-script packages-install -- --no-dev
          composer run-script generate-autoloader
          npm ci --force
          npm run build

      - name: Prepare Release Directory
        run: |
          mkdir a8csp-atlantis
          cp -r a8csp-atlantis.php functions.php functions-bootstrap.php index.php LICENSE src includes assets blocks languages models templates vendor a8csp-atlantis/

      - name: Zip Release
        run: |
          zip -r ${{ github.event.repository.name }}.zip ./a8csp-atlantis

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ github.event.repository.name }}.zip
